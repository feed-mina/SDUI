spring:
  config:
    activate:
      on-profile: prod
  datasource:
    # deploy.yml의 SPRING_DATASOURCE_* 환경변수가 자동으로 적용되므로 제거합니다.
  data:
    redis:
      host: sdui-redis
      port: 6379
  mail:
    password: ${MAIL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false

jwt:
  secret-key: ${JWT_SECRET_KEY}

app:
  url:
    web: ${WEB_URL:http://sdui-delta.vercel.app}
    mobile: ${MOBILE_URL:http://sdui-delta.vercel.app://}

kakao:
  redirect-uri: ${KAKAO_REDIRECT_URI}
